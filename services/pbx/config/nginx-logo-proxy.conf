# VVP Logo Proxy - nginx reverse proxy
# Sprint 79: TLS termination for brand logo serving
#
# Add this location block to the FusionPBX nginx server block:
#   /etc/nginx/sites-enabled/fusionpbx
#
# Insert inside the server { ... } block that handles HTTPS (port 443).
#
# Serves verified brand logos from sip-verify's local cache.
# Logos are content-addressed by Blake3-256 SAID — immutable once cached.

location /logo/ {
    proxy_pass http://127.0.0.1:8080/logo/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Logos are immutable (keyed by cryptographic hash) — cache aggressively
    proxy_cache_valid 200 86400s;
    proxy_cache_valid 404 60s;

    # Don't buffer — logos are small (< 2MB)
    proxy_buffering off;
}
