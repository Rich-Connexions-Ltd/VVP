# nginx configuration for pbx.rcnx.io — PBX Portal
#
# Sprint 77: Replaces the default FusionPBX-at-root config with a portal
# landing page. FusionPBX admin console moved to /fusion/.
#
# DEPLOYMENT NOTE: This file replaces (or overrides) the existing nginx server
# block for pbx.rcnx.io. Read the current nginx config before deploying to
# confirm the FusionPBX proxy mechanism (fastcgi_pass, proxy_pass, etc.) and
# copy those directives verbatim into the /fusion/ block below.
#
# ACME RENEWAL: certbot renew --dry-run MUST pass after any nginx change.
# The /.well-known/acme-challenge/ block below ensures Let's Encrypt can
# renew the certificate without using the old FusionPBX root.
#
# HSTS: Strict-Transport-Security is applied to portal pages to enforce
# HTTPS-only for the admin API key flow. The issuer (vvp-issuer.rcnx.io)
# also enforces HSTS via Azure Container Apps TLS — the ISSUER_BASE_URL
# constant in pbx-admin/index.html is hardcoded to https://.

server {
    listen 443 ssl;
    server_name pbx.rcnx.io;

    # TLS — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/pbx.rcnx.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pbx.rcnx.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # -------------------------------------------------------------------------
    # ACME challenge — must be accessible for Let's Encrypt renewal.
    # This location takes precedence over the portal root and /fusion/ proxy.
    # -------------------------------------------------------------------------
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        try_files $uri =404;
    }

    # -------------------------------------------------------------------------
    # PBX Portal — static files served from /var/www/pbx-portal/
    # CSP applied per-location (not globally) to avoid breaking FusionPBX.
    # style-src 'self' — no 'unsafe-inline'; all portal CSS is in external files.
    # -------------------------------------------------------------------------

    # Landing page
    location = / {
        root /var/www/pbx-portal;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://vvp-issuer.rcnx.io; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files /index.html =404;
    }

    # Portal CSS (shared stylesheet for landing + admin pages)
    location = /portal.css {
        root /var/www/pbx-portal;
        add_header Cache-Control "public, max-age=3600";
    }

    # PBX Management admin UI
    location /pbx-admin/ {
        alias /var/www/pbx-portal/pbx-admin/;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://vvp-issuer.rcnx.io; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri $uri/ /pbx-admin/index.html;
    }

    # Phone PWA
    location /phone/ {
        alias /var/www/pbx-portal/phone/;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' wss://pbx.rcnx.io:7443; script-src 'self' https://cdn.jsdelivr.net; style-src 'self'; img-src 'self' data:; font-src 'self'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri $uri/ /phone/index.html;
    }

    # Phone PWA service worker — must have correct scope header
    location = /phone/sw.js {
        alias /var/www/pbx-portal/phone/sw.js;
        add_header Service-Worker-Allowed "/phone/";
        add_header Cache-Control "no-cache";
        types { application/javascript js; }
    }

    # -------------------------------------------------------------------------
    # FusionPBX admin console — moved from / to /fusion/
    #
    # IMPLEMENTATION NOTE: Copy the exact fastcgi_pass / proxy_pass directives
    # from the existing nginx config here. The FusionPBX proxy mechanism varies
    # by installation (PHP-FPM fastcgi, or nginx proxy_pass to an upstream).
    # Verify: login to FusionPBX, check all sub-pages, session cookies, and
    # asset paths work correctly under /fusion/ before removing issuer routes.
    #
    # SECURITY NOTE (trust boundary): FusionPBX runs on the same origin
    # (pbx.rcnx.io) as the PBX portal. An XSS vulnerability in FusionPBX
    # could allow an attacker to read the admin API key from sessionStorage.
    # Mitigation in this config: defence-in-depth headers below (clickjacking,
    # MIME sniffing, XSS filter). Full isolation would require moving FusionPBX
    # to a separate subdomain (e.g. fusion.pbx.rcnx.io) — planned for a future
    # sprint once FusionPBX subdomain routing is validated.
    # -------------------------------------------------------------------------
    location /fusion/ {
        # Defence-in-depth security headers for the FusionPBX application.
        add_header X-Content-Type-Options   "nosniff"        always;
        add_header X-Frame-Options          "SAMEORIGIN"     always;
        add_header X-XSS-Protection         "1; mode=block"  always;
        add_header Referrer-Policy          "strict-origin"  always;

        # TODO: fill in from existing nginx config during deployment
        # Example for PHP-FPM:
        #   alias /var/www/fusionpbx/;
        #   fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        #   include fastcgi_params;
        #   fastcgi_param SCRIPT_FILENAME $request_filename;
        # Example for proxy_pass:
        #   proxy_pass http://127.0.0.1:8080/;
        #   proxy_set_header Host $host;
        #   proxy_set_header X-Real-IP $remote_addr;
    }

    # -------------------------------------------------------------------------
    # SIP Monitor (unchanged from current config)
    # -------------------------------------------------------------------------
    location /sip-monitor/ {
        proxy_pass http://127.0.0.1:8090/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name pbx.rcnx.io;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
